name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-implant:
    name: Build implant (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [x64]
        include:
          - os: ubuntu-latest
            arch: arm64
          - os: macos-latest
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Rust (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          curl -proto '=https' -tlsv1.2 -sSf https://win.rustup.rs -o rustup-init.exe
          .\rustup-init.exe -y
          echo "$HOME/.cargo/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build implant
        run: |
          cd implant
          cargo build --release --target ${{ matrix.arch }}-unknown-none
        env:
          CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER: ${{ matrix.os == 'macos-latest' && matrix.arch == 'arm64' && 'clang' || 'clang' }}

      - name: Build implant (macOS ARM)
        if: matrix.os == 'macos-latest' && matrix.arch == 'arm64'
        run: |
          cd implant
          cargo build --release --target aarch64-apple-darwin

      - name: Build implant (macOS x64)
        if: matrix.os == 'macos-latest' && matrix.arch == 'x64'
        run: |
          cd implant
          cargo build --release --target x86_64-apple-darwin

      - name: Build implant (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd implant
          cargo build --release --target x86_64-unknown-linux-gnu
          cargo build --release --target aarch64-unknown-linux-gnu

      - name: Build implant (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd implant
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload implant binary
        uses: actions/upload-artifact@v4
        with:
          name: rustybuns-implant-${{ matrix.os }}-${{ matrix.arch }}
          path: implant/target/${{ matrix.os == 'ubuntu-latest' && (matrix.arch == 'x64' && 'x86_64-unknown-linux-gnu' || 'aarch64-unknown-linux-gnu') || matrix.os == 'macos-latest' && (matrix.arch == 'x64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin') || matrix.os == 'windows-latest' && 'x86_64-pc-windows-msvc' }}/release/rustybuns-implant.exe
          retention-days: 5

  build-controller:
    name: Build controller (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Build controller
        run: |
          cd controller
          bun build --target bun src/index.ts --outdir=dist
        env:
          BUN_INSTALL: $HOME/.bun

      - name: Upload controller
        uses: actions/upload-artifact@v4
        with:
          name: rustybuns-controller
          path: controller/dist/
          retention-days: 5

  test-implant:
    name: Test implant
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Run tests
        run: |
          cd implant
          cargo test
